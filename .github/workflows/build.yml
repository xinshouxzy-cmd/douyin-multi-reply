name: Build Windows Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyinstaller selenium webdriver-manager PyQt5 pyqt5-tools
      - name: Get chromedriver
        run: python -c "from webdriver_manager.chrome import ChromeDriverManager; p = ChromeDriverManager().install(); import shutil; shutil.copy(p, 'chromedriver.exe')"
      - name: Build
        run: pyinstaller --onedir --windowed --name "抖音多账号自动回复" --add-data "chromedriver.exe;." --collect-all PyQt5 --collect-all selenium --hidden-import selenium.webdriver.chrome.webdriver auto_reply_v2.py
      - name: Package
        run: Compress-Archive -Path "dist\抖音多账号自动回复\*" -DestinationPath "抖音多账号自动回复.zip"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 抖音多账号自动回复
          path: 抖音多账号自动回复.zip
